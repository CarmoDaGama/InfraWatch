version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - backend-data:/app/data
    environment:
      PORT: 3001
      MONITOR_INTERVAL: 5000
      EMAIL_ENABLED: 'false'
      TELEGRAM_ENABLED: 'false'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
